<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>KLU Hostel — Admin Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:      #f7f6f3;
  --bg2:     #ffffff;
  --bg3:     #f0ede8;
  --bg4:     #e8e4de;
  --border:  rgba(0,0,0,0.07);
  --border2: rgba(0,0,0,0.12);
  --border3: rgba(0,0,0,0.18);
  --text:    #1a1917;
  --text2:   #6b6760;
  --text3:   #a09d99;
  --ink:     #2d2b29;
  --accent:  #c84b2f;
  --accent2: #e05535;
  --accent-l:#fdf0ed;
  --accent-b:#f5c4ba;
  --green:   #2a7d4f;
  --green-l: #eaf5ee;
  --green-b: #b3dfc5;
  --amber:   #b5620a;
  --amber-l: #fef5e7;
  --amber-b: #f5d8a8;
  --blue:    #1e5fa8;
  --blue-l:  #eaf1fb;
  --blue-b:  #b3ceee;
  --red:     #c0392b;
  --red-l:   #fdf0ee;
  --red-b:   #f5b8b2;
  --font:    'Plus Jakarta Sans', sans-serif;
  --mono:    'JetBrains Mono', monospace;
  --r:       8px;
  --rl:      14px;
  --sidebar: 240px;
}

*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;line-height:1.6;min-height:100vh;}

/* ── LAYOUT ── */
.app{display:flex;min-height:100vh;}

/* ── SIDEBAR ── */
.sidebar{
  width:var(--sidebar);min-width:var(--sidebar);
  background:var(--ink);
  display:flex;flex-direction:column;
  position:fixed;top:0;left:0;bottom:0;z-index:100;
}
.sidebar-top{padding:24px 20px 18px;border-bottom:1px solid rgba(255,255,255,0.08);}
.s-label{
  display:inline-block;
  background:var(--accent);color:#fff;
  font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  padding:3px 8px;border-radius:4px;margin-bottom:10px;font-family:var(--mono);
}
.s-title{font-size:18px;font-weight:700;color:#fff;letter-spacing:-.02em;}
.s-sub{font-size:11px;color:rgba(255,255,255,.3);font-family:var(--mono);margin-top:2px;}

.nav{flex:1;padding:14px 12px;display:flex;flex-direction:column;gap:2px;overflow-y:auto;}
.nav-group-label{
  font-size:9px;font-family:var(--mono);color:rgba(255,255,255,.25);
  letter-spacing:.1em;text-transform:uppercase;
  padding:10px 8px 4px;
}
.nav-btn{
  display:flex;align-items:center;gap:10px;
  padding:9px 10px;border-radius:var(--r);
  cursor:pointer;border:none;background:none;
  color:rgba(255,255,255,.5);font-family:var(--font);font-size:13px;
  text-align:left;width:100%;transition:all .15s;
  position:relative;
}
.nav-btn svg{flex-shrink:0;opacity:.7;}
.nav-btn:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.85);}
.nav-btn.active{background:var(--accent);color:#fff;}
.nav-btn.active svg{opacity:1;}
.nav-btn .badge-count{
  margin-left:auto;background:rgba(255,255,255,.15);
  color:rgba(255,255,255,.7);font-family:var(--mono);font-size:10px;
  padding:1px 6px;border-radius:99px;
}
.nav-btn.active .badge-count{background:rgba(255,255,255,.25);color:#fff;}

.sidebar-foot{padding:14px 12px;border-top:1px solid rgba(255,255,255,.08);}
.admin-chip{
  display:flex;align-items:center;gap:9px;
  padding:9px 10px;border-radius:var(--r);
  background:rgba(255,255,255,.06);
}
.admin-av{
  width:30px;height:30px;border-radius:50%;
  background:var(--accent);color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;flex-shrink:0;
}
.admin-name{font-size:12px;color:rgba(255,255,255,.85);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.admin-role{font-size:10px;color:rgba(255,255,255,.3);font-family:var(--mono);}
.logout-icon{margin-left:auto;background:none;border:none;cursor:pointer;color:rgba(255,255,255,.3);padding:4px;border-radius:5px;transition:color .15s;display:flex;}
.logout-icon:hover{color:var(--accent);}

/* ── MAIN ── */
.main{margin-left:var(--sidebar);flex:1;display:flex;flex-direction:column;min-height:100vh;}
.topbar{
  background:var(--bg2);border-bottom:1px solid var(--border2);
  padding:0 28px;height:56px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:50;
}
.topbar-left{display:flex;align-items:center;gap:10px;}
.topbar-title{font-size:16px;font-weight:700;color:var(--text);letter-spacing:-.02em;}
.topbar-crumb{font-size:13px;color:var(--text3);}
.topbar-right{display:flex;align-items:center;gap:8px;}
.tb-date{font-family:var(--mono);font-size:11px;color:var(--text3);background:var(--bg3);padding:5px 10px;border-radius:6px;border:1px solid var(--border);}
.content{padding:28px;flex:1;}
.page{animation:pageIn .18s ease;}
@keyframes pageIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}

/* ── CARDS ── */
.card{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--rl);padding:22px 24px;}
.card-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.card-title{font-size:13px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;}

/* ── STAT CARDS ── */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px;}
.stat{
  background:var(--bg2);border:1px solid var(--border2);
  border-radius:var(--rl);padding:20px 22px;
  position:relative;overflow:hidden;
}
.stat::after{
  content:'';position:absolute;right:-10px;bottom:-10px;
  width:60px;height:60px;border-radius:50%;
  background:var(--stat-color,var(--accent));opacity:.06;
}
.stat-lbl{font-size:11px;font-family:var(--mono);color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;}
.stat-val{font-size:30px;font-weight:700;color:var(--text);letter-spacing:-.03em;line-height:1;}
.stat-note{font-size:11px;color:var(--text3);margin-top:6px;}
.stat-dot{width:8px;height:8px;border-radius:50%;background:var(--stat-color,var(--accent));display:inline-block;margin-right:6px;}

/* ── GRID ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}

/* ── BADGE ── */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:5px;font-size:11px;font-family:var(--mono);font-weight:600;letter-spacing:.02em;}
.b-green{background:var(--green-l);color:var(--green);border:1px solid var(--green-b);}
.b-red{background:var(--red-l);color:var(--red);border:1px solid var(--red-b);}
.b-amber{background:var(--amber-l);color:var(--amber);border:1px solid var(--amber-b);}
.b-blue{background:var(--blue-l);color:var(--blue);border:1px solid var(--blue-b);}
.b-gray{background:var(--bg3);color:var(--text2);border:1px solid var(--border2);}
.b-accent{background:var(--accent-l);color:var(--accent);border:1px solid var(--accent-b);}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border-radius:var(--r);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;border:none;font-family:var(--font);}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{background:var(--accent2);}
.btn-outline{background:transparent;color:var(--text2);border:1px solid var(--border2);}
.btn-outline:hover{background:var(--bg3);color:var(--text);}
.btn-danger{background:var(--red-l);color:var(--red);border:1px solid var(--red-b);}
.btn-danger:hover{background:#fde5e2;}
.btn-green{background:var(--green-l);color:var(--green);border:1px solid var(--green-b);}
.btn-green:hover{background:#d8f0e3;}
.btn-sm{padding:6px 13px;font-size:12px;}
.btn-xs{padding:4px 9px;font-size:11px;}

/* ── FORM ── */
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:14px;}
.fg:last-child{margin-bottom:0;}
.fl{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;font-family:var(--mono);}
.fi,.fsel,textarea{
  background:var(--bg3);border:1.5px solid var(--border2);
  border-radius:var(--r);color:var(--text);font-family:var(--font);
  font-size:13px;padding:10px 13px;outline:none;
  transition:border-color .15s,background .15s;width:100%;
}
.fi:focus,.fsel:focus,textarea:focus{border-color:var(--accent);background:var(--bg2);}
.fi::placeholder,textarea::placeholder{color:var(--text3);}
.fsel option{background:var(--bg2);}
textarea{resize:vertical;min-height:80px;}
.form-err{font-size:11px;color:var(--red);margin-top:2px;font-family:var(--mono);}
.input-hint{font-size:11px;color:var(--text3);font-family:var(--mono);margin-top:2px;}

/* ── TABLE ── */
.tbl-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;}
th{text-align:left;padding:10px 14px;font-size:11px;font-family:var(--mono);color:var(--text3);letter-spacing:.06em;text-transform:uppercase;border-bottom:1.5px solid var(--border2);white-space:nowrap;}
td{padding:12px 14px;border-bottom:1px solid var(--border);font-size:13px;color:var(--text);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--bg3);}
.mono{font-family:var(--mono);font-size:12px;color:var(--text2);}

/* ── PROG BAR ── */
.prog{background:var(--bg3);border-radius:99px;height:6px;overflow:hidden;}
.prog-fill{height:100%;border-radius:99px;transition:width .6s ease;}

/* ── TABS ── */
.tab-row{display:flex;gap:4px;border-bottom:2px solid var(--border);margin-bottom:20px;}
.tab{padding:9px 16px;font-size:13px;font-weight:600;cursor:pointer;border:none;background:none;color:var(--text2);font-family:var(--font);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s;}
.tab:hover{color:var(--text);}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}

/* ── SECTION HEADER ── */
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.sh-title{font-size:18px;font-weight:700;letter-spacing:-.02em;color:var(--text);}
.sh-sub{font-size:13px;color:var(--text3);margin-top:2px;}

/* ── UPLOAD ZONE ── */
.drop-zone{
  border:2px dashed var(--border2);border-radius:var(--rl);
  padding:36px;text-align:center;cursor:pointer;
  background:var(--bg3);transition:all .2s;
}
.drop-zone:hover,.drop-zone.drag{border-color:var(--accent);background:var(--accent-l);}
.drop-zone input{display:none;}
.dz-icon{font-size:32px;margin-bottom:10px;}
.dz-txt{font-size:15px;font-weight:600;color:var(--text);margin-bottom:4px;}
.dz-sub{font-size:12px;color:var(--text3);}

/* ── ALERT/ERROR ── */
.alert{padding:12px 14px;border-radius:var(--r);font-size:13px;line-height:1.5;margin-bottom:14px;}
.alert-err{background:var(--red-l);border:1px solid var(--red-b);color:var(--red);}
.alert-ok{background:var(--green-l);border:1px solid var(--green-b);color:var(--green);}
.alert-info{background:var(--blue-l);border:1px solid var(--blue-b);color:var(--blue);}
.alert-warn{background:var(--amber-l);border:1px solid var(--amber-b);color:var(--amber);}

/* ── DIVIDER ── */
.divider{border:none;border-top:1px solid var(--border);margin:18px 0;}

/* ── EMPTY STATE ── */
.empty{text-align:center;padding:40px 20px;color:var(--text3);}
.empty-icon{font-size:36px;margin-bottom:10px;}
.empty-txt{font-size:14px;font-weight:500;}

/* ── TOAST ── */
.toast-wrap{position:fixed;bottom:24px;right:24px;z-index:999;display:flex;flex-direction:column;gap:8px;}
.toast{
  background:var(--ink);border-radius:var(--r);
  padding:12px 16px;font-size:13px;color:#fff;
  box-shadow:0 4px 20px rgba(0,0,0,.15);
  display:flex;align-items:center;gap:10px;min-width:220px;
  animation:fadeIn .25s ease;font-family:var(--font);
}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* ── LOGIN ── */
.login-page{
  min-height:100vh;display:flex;
  background:var(--ink);
}
.login-left{
  flex:1;display:flex;align-items:center;justify-content:center;
  padding:40px;
  background: linear-gradient(135deg,#1a1917 60%,#2d1a14);
}
.login-art{
  max-width:420px;
}
.login-art-title{
  font-size:42px;font-weight:700;color:#fff;
  letter-spacing:-.04em;line-height:1.1;margin-bottom:16px;
}
.login-art-title span{color:var(--accent);}
.login-art-desc{font-size:14px;color:rgba(255,255,255,.4);line-height:1.8;}
.login-features{margin-top:32px;display:flex;flex-direction:column;gap:12px;}
.login-feat{display:flex;align-items:center;gap:12px;font-size:13px;color:rgba(255,255,255,.55);}
.login-feat-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);flex-shrink:0;}
.login-right{
  width:440px;background:var(--bg2);
  display:flex;align-items:center;justify-content:center;
  padding:40px;
}
.login-form{width:100%;max-width:360px;}
.login-form h2{font-size:24px;font-weight:700;letter-spacing:-.03em;margin-bottom:4px;}
.login-form p{color:var(--text3);font-size:13px;margin-bottom:28px;}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px;}

/* ── MODAL ── */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.45);
  z-index:200;display:flex;align-items:center;justify-content:center;
  padding:20px;animation:fadeIn .2s ease;
}
.modal{
  background:var(--bg2);border-radius:var(--rl);
  width:100%;max-width:480px;max-height:90vh;overflow-y:auto;
  padding:28px;box-shadow:0 20px 60px rgba(0,0,0,.2);
}
.modal-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.modal-title{font-size:18px;font-weight:700;letter-spacing:-.02em;}
.modal-close{background:none;border:none;cursor:pointer;color:var(--text3);font-size:20px;padding:2px 6px;border-radius:5px;transition:color .15s;}
.modal-close:hover{color:var(--text);}

@media(max-width:900px){
  .login-left{display:none;}
  .login-right{width:100%;padding:24px;}
  .stats-row{grid-template-columns:1fr 1fr;}
  .g2{grid-template-columns:1fr;}
  .form-row{grid-template-columns:1fr;}
  .sidebar{transform:translateX(-100%);}
  .main{margin-left:0;}
}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ─── CONFIG ───────────────────────────────────────────────
// ─── BACKEND CONFIG ───────────────────────────────────────
// Priority: 1) saved in localStorage, 2) same-origin /api, 3) localhost fallback
const getBaseURL = () => {
  const saved = localStorage.getItem('klu_api_url');
  if (saved) return saved;
  // If frontend is served from the same server, use relative path
  if (window.location.hostname !== 'localhost' && window.location.hostname !== '127.0.0.1') {
    return window.location.origin + '/api';
  }
  return 'http://localhost:5000/api';
};
let API = getBaseURL();

// ─── API ──────────────────────────────────────────────────
// Shared connection state (simple pub-sub)
const connListeners = [];
let connStatus = 'unknown'; // 'ok' | 'error' | 'unknown'
const setConn = (s) => { connStatus = s; connListeners.forEach(fn => fn(s)); };

const handleFetchError = (err, path) => {
  console.error('API error:', path, err);
  if (err.name === 'TypeError' && err.message.includes('fetch')) {
    setConn('error');
    throw { message: 'Cannot reach server. Check your backend URL in Settings.', _network: true };
  }
  throw err;
};

const api = {
  get: async (path, token) => {
    try {
      const r = await fetch(API+path, {headers:token?{Authorization:`Bearer ${token}`}:{}});
      setConn('ok');
      return r.json();
    } catch(e) { return handleFetchError(e, path); }
  },
  post: async (path, body, token) => {
    try {
      const r = await fetch(API+path, {
        method:'POST',
        headers:{'Content-Type':'application/json',...(token?{Authorization:`Bearer ${token}`}:{})},
        body:JSON.stringify(body)
      });
      setConn('ok');
      return r.json();
    } catch(e) { return handleFetchError(e, path); }
  },
  del: async (path, token) => {
    try {
      const r = await fetch(API+path, {method:'DELETE',headers:token?{Authorization:`Bearer ${token}`}:{}});
      setConn('ok');
      return r.json();
    } catch(e) { return handleFetchError(e, path); }
  },
  upload: async (path, fd, token) => {
    try {
      const r = await fetch(API+path, {method:'POST',headers:token?{Authorization:`Bearer ${token}`}:{},body:fd});
      setConn('ok');
      return r.json();
    } catch(e) { return handleFetchError(e, path); }
  },
  ping: async () => {
    try {
      const r = await fetch(API.replace('/api','') + '/', {signal: AbortSignal.timeout(4000)});
      setConn('ok'); return true;
    } catch(e) { setConn('error'); return false; }
  }
};

// ─── SETTINGS MODAL ───────────────────────────────────────
function SettingsModal({ onClose }) {
  const [url, setUrl] = useState(API);
  const [testing, setTesting] = useState(false);
  const [testResult, setTestResult] = useState(null);

  const test = async () => {
    setTesting(true); setTestResult(null);
    const old = API;
    API = url.replace(/\/$/, '');
    const ok = await api.ping();
    setTestResult(ok ? 'ok' : 'fail');
    if (!ok) API = old;
    setTesting(false);
  };

  const save = () => {
    API = url.replace(/\/$/, '');
    localStorage.setItem('klu_api_url', API);
    setConn('unknown');
    onClose();
    window.location.reload();
  };

  const reset = () => {
    localStorage.removeItem('klu_api_url');
    setUrl(window.location.hostname !== 'localhost' && window.location.hostname !== '127.0.0.1'
      ? window.location.origin + '/api'
      : 'http://localhost:5000/api');
    setTestResult(null);
  };

  return (
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal" style={{maxWidth:460}}>
        <div className="modal-hd">
          <div className="modal-title">⚙️ Backend settings</div>
          <button className="modal-close" onClick={onClose}>×</button>
        </div>
        <p style={{fontSize:13,color:'var(--text2)',marginBottom:16,lineHeight:1.7}}>
          Set the URL of your Node.js backend. This is saved in your browser and persists across sessions.
        </p>
        <div className="fg">
          <label className="fl">Backend API URL</label>
          <input className="fi" value={url} onChange={e=>setUrl(e.target.value)}
            placeholder="http://your-server-ip:5000/api" style={{fontFamily:'var(--mono)',fontSize:12}}/>
          <span className="input-hint">Example: http://192.168.1.10:5000/api</span>
        </div>
        {testResult==='ok' && <div className="alert alert-ok" style={{marginBottom:12}}>✅ Connected! Server is reachable.</div>}
        {testResult==='fail' && <div className="alert alert-err" style={{marginBottom:12}}>❌ Could not reach server. Check the URL and make sure backend is running.</div>}
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          <button className="btn btn-outline btn-sm" onClick={test} disabled={testing}>
            {testing ? 'Testing...' : '🔌 Test connection'}
          </button>
          <button className="btn btn-outline btn-sm" onClick={reset}>↩ Reset to default</button>
          <button className="btn btn-primary" style={{marginLeft:'auto'}} onClick={save}>Save & reload</button>
        </div>
        <hr className="divider"/>
        <div style={{fontSize:11,color:'var(--text3)',fontFamily:'var(--mono)',lineHeight:1.8}}>
          Current: {API}<br/>
          Host: {window.location.origin}
        </div>
      </div>
    </div>
  );
}

// ─── CONNECTION BANNER ────────────────────────────────────
function ConnBanner({ onOpenSettings }) {
  const [status, setStatus] = useState(connStatus);
  useEffect(() => {
    const fn = s => setStatus(s);
    connListeners.push(fn);
    return () => { const i = connListeners.indexOf(fn); if(i>-1) connListeners.splice(i,1); };
  }, []);
  if (status !== 'error') return null;
  return (

// ─── LOGIN ────────────────────────────────────────────────
function Login({onLogin}){
  const [email,setEmail]=useState('');
  const [pass,setPass]=useState('');
  const [err,setErr]=useState('');
  const [loading,setLoading]=useState(false);

  const submit=async()=>{
    if(!email||!pass){setErr('Please fill in all fields.');return;}
    setLoading(true);setErr('');
    try{
      const res=await api.post('/admin/login',{email,password:pass});
      if(res.token){
        const payload=JSON.parse(atob(res.token.split('.')[1]));
        onLogin(res.token,payload);
      } else setErr(res.message||'Login failed.');
    }catch(e){setErr('Could not connect to server.');}
    setLoading(false);
  };

  return(
    <div className="login-page">
      <div className="login-left">
        <div className="login-art">
          <div className="login-art-title">KLU Hostel<br/><span>Admin</span><br/>Control Centre</div>
          <div className="login-art-desc">Manage students, staff, bookings and food attendance — all in one place.</div>
          <div className="login-features">
            {['Student whitelist & registration control','Staff registration & management','Barcode attendance reports','Menu & notice management'].map(f=>(
              <div key={f} className="login-feat"><div className="login-feat-dot"/>{f}</div>
            ))}
          </div>
        </div>
      </div>
      <div className="login-right">
        <div className="login-form">
          <h2>Welcome back</h2>
          <p>Sign in to your admin account</p>
          {err&&<div className="alert alert-err">{err}</div>}
          <div className="fg"><label className="fl">Email</label>
            <input className="fi" type="email" placeholder="admin@klu.ac.in"
              value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submit()}/>
          </div>
          <div className="fg"><label className="fl">Password</label>
            <input className="fi" type="password" placeholder="••••••••"
              value={pass} onChange={e=>setPass(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submit()}/>
          </div>
          <button className="btn btn-primary" style={{width:'100%',justifyContent:'center',marginTop:8,padding:'11px'}}
            onClick={submit} disabled={loading}>
            {loading?'Signing in...':'Sign in →'}
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── STAFF ────────────────────────────────────────────────
function Staff({token, addToast}){
  const [staff,setStaff]=useState([]);
  const [loading,setLoading]=useState(true);
  const [showModal,setShowModal]=useState(false);
  const [search,setSearch]=useState('');
  // Registration form state
  const [form,setForm]=useState({name:'',email:'',password:'',confirmPass:'',role:'staff'});
  const [formErr,setFormErr]=useState({});
  const [submitting,setSubmitting]=useState(false);

  const loadStaff=()=>{
    setLoading(true);
    api.get('/staff',token).then(r=>{
      if(Array.isArray(r)) setStaff(r);
      setLoading(false);
    });
  };
  useEffect(()=>{ loadStaff(); },[]);

  const filtered=staff.filter(s=>
    s.name?.toLowerCase().includes(search.toLowerCase())||
    s.email?.toLowerCase().includes(search.toLowerCase())||
    s.role?.toLowerCase().includes(search.toLowerCase())
  );

  const validate=()=>{
    const e={};
    if(!form.name.trim()) e.name='Name is required';
    if(!form.email.trim()) e.email='Email is required';
    else if(!/\S+@\S+\.\S+/.test(form.email)) e.email='Invalid email address';
    if(!form.password) e.password='Password is required';
    else if(form.password.length<6) e.password='Minimum 6 characters';
    if(form.password!==form.confirmPass) e.confirmPass='Passwords do not match';
    if(!form.role) e.role='Role is required';
    setFormErr(e);
    return Object.keys(e).length===0;
  };

  const registerStaff=async()=>{
    if(!validate()) return;
    setSubmitting(true);
    try{
      const res=await api.post('/staff/register',{
        name:form.name.trim(),
        email:form.email.trim(),
        password:form.password,
        role:form.role
      },token);
      if(res.id||res.name){
        addToast('✅',`Staff "${res.name||form.name}" registered!`);
        setShowModal(false);
        setForm({name:'',email:'',password:'',confirmPass:'',role:'staff'});
        setFormErr({});
        loadStaff();
      } else {
        addToast('❌',res.message||'Registration failed');
      }
    }catch(e){addToast('❌','Server error');}
    setSubmitting(false);
  };

  const closeModal=()=>{
    setShowModal(false);
    setForm({name:'',email:'',password:'',confirmPass:'',role:'staff'});
    setFormErr({});
  };

  const roleColor={staff:'b-blue',admin:'b-accent',manager:'b-amber'};

  return(
    <div className="page">
      <div className="sh">
        <div><div className="sh-title">Staff management</div><div className="sh-sub">{staff.length} staff registered</div></div>
        <button className="btn btn-primary" onClick={()=>setShowModal(true)}>{Ic.plus} Register new staff</button>
      </div>

      <div className="card">
        <div style={{marginBottom:14}}>
          <input className="fi" placeholder="Search by name, email or role..." value={search}
            onChange={e=>setSearch(e.target.value)} style={{maxWidth:360}}/>
        </div>
        <div className="tbl-wrap">
          <table>
            <thead><tr><th>#</th><th>Staff member</th><th>Email</th><th>Role</th><th>Joined</th></tr></thead>
            <tbody>
              {loading&&<tr><td colSpan="5" style={{textAlign:'center',padding:24,color:'var(--text3)'}}>Loading...</td></tr>}
              {!loading&&filtered.length===0&&<tr><td colSpan="5"><div className="empty"><div className="empty-icon">👥</div><div className="empty-txt">No staff found</div></div></td></tr>}
              {filtered.map((s,i)=>(
                <tr key={s.id}>
                  <td className="mono" style={{color:'var(--text3)'}}>{i+1}</td>
                  <td>
                    <div style={{display:'flex',alignItems:'center',gap:10}}>
                      <div style={{
                        width:32,height:32,borderRadius:'50%',
                        background:'var(--blue-l)',color:'var(--blue)',
                        display:'flex',alignItems:'center',justifyContent:'center',
                        fontSize:11,fontWeight:700,flexShrink:0
                      }}>{initials(s.name)}</div>
                      <span style={{fontWeight:600}}>{s.name}</span>
                    </div>
                  </td>
                  <td className="mono">{s.email}</td>
                  <td>
                    <span className={`badge ${roleColor[s.role]||'b-gray'}`} style={{textTransform:'capitalize'}}>
                      {s.role||'staff'}
                    </span>
                  </td>
                  <td className="mono">{fmtDate(s.created_at)}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>

      {/* ── REGISTER STAFF MODAL ── */}
      {showModal&&(
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&closeModal()}>
          <div className="modal">
            <div className="modal-hd">
              <div className="modal-title">Register new staff</div>
              <button className="modal-close" onClick={closeModal}>×</button>
            </div>

            <div className="alert alert-info" style={{marginBottom:16}}>
              Staff will be able to log in to the staff portal using these credentials.
            </div>

            <div className="form-row">
              <div className="fg">
                <label className="fl">Full name *</label>
                <input className="fi" placeholder="e.g. Priya Sharma"
                  value={form.name} onChange={e=>setForm({...form,name:e.target.value})}/>
                {formErr.name&&<span className="form-err">{formErr.name}</span>}
              </div>
              <div className="fg">
                <label className="fl">Role *</label>
                <select className="fsel" value={form.role} onChange={e=>setForm({...form,role:e.target.value})}>
                  <option value="staff">Staff (dining hall)</option>
                  <option value="manager">Manager</option>
                  <option value="warden">Warden</option>
                  <option value="cook">Cook</option>
                </select>
                {formErr.role&&<span className="form-err">{formErr.role}</span>}
              </div>
            </div>

            <div className="fg">
              <label className="fl">Email address *</label>
              <input className="fi" type="email" placeholder="staff@klu.ac.in"
                value={form.email} onChange={e=>setForm({...form,email:e.target.value})}/>
              {formErr.email&&<span className="form-err">{formErr.email}</span>}
              <span className="input-hint">Staff will use this to log in to the portal</span>
            </div>

            <div className="form-row">
              <div className="fg">
                <label className="fl">Password *</label>
                <input className="fi" type="password" placeholder="Min. 6 characters"
                  value={form.password} onChange={e=>setForm({...form,password:e.target.value})}/>
                {formErr.password&&<span className="form-err">{formErr.password}</span>}
              </div>
              <div className="fg">
                <label className="fl">Confirm password *</label>
                <input className="fi" type="password" placeholder="Repeat password"
                  value={form.confirmPass} onChange={e=>setForm({...form,confirmPass:e.target.value})}/>
                {formErr.confirmPass&&<span className="form-err">{formErr.confirmPass}</span>}
              </div>
            </div>

            <hr className="divider"/>

            <div style={{display:'flex',gap:10,justifyContent:'flex-end'}}>
              <button className="btn btn-outline" onClick={closeModal}>Cancel</button>
              <button className="btn btn-primary" onClick={registerStaff} disabled={submitting}>
                {submitting?'Registering...':(<>{Ic.check} Register staff</>)}
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

    try{
      const r=await api.post('/admin/allowed-email/add',{email:email.trim()},token);
      if(r.email||r.message?.includes('added')){
        addToast('✅','Email whitelisted!');
        setEmail('');
      } else addToast('❌',r.message||'Failed');
    }catch(e){addToast('❌','Server error');}
    setLoading(false);
  };

  const uploadXlsx=async()=>{
    if(!file){addToast('⚠️','Please select a file');return;}
    setLoading(true);setResult(null);
    const fd=new FormData();fd.append('file',file);
    try{
      const r=await api.upload('/admin/allowed-email/upload',fd,token);
      if(r.inserted!==undefined){
        setResult(r);
        addToast('✅',`${r.inserted} emails added!`);
        setFile(null);
      } else addToast('❌',r.message||'Upload failed');
    }catch(e){addToast('❌','Server error');}
    setLoading(false);
  };

  return(
    <div className="page">
      <div className="sh"><div><div className="sh-title">Allowed emails</div><div className="sh-sub">Control which students can register</div></div></div>

      <div className="alert alert-info" style={{marginBottom:20}}>
        Only students with emails in this whitelist can create an account. The email must also end with <strong>@klu.ac.in</strong>.
      </div>

      <div className="tab-row">
        {[['single','Add single email'],['bulk','Bulk upload (XLSX)']].map(([id,lbl])=>(
          <button key={id} className={`tab${tab===id?' active':''}`} onClick={()=>{setTab(id);setResult(null);}}>
            {lbl}
          </button>
        ))}

      {tab==='single'&&(
        <div className="card" style={{maxWidth:480}}>
          <div className="card-title" style={{marginBottom:14}}>Whitelist a student email</div>
          <div className="fg">
            <label className="fl">Student email</label>
            <input className="fi" type="email" placeholder="2200030000@klu.ac.in"
              value={email} onChange={e=>setEmail(e.target.value)}
              onKeyDown={e=>e.key==='Enter'&&addSingle()}/>
            <span className="input-hint">Must end with @klu.ac.in · Reg no is extracted from prefix</span>
          </div>
          <button className="btn btn-primary" onClick={addSingle} disabled={loading}>
            {loading?'Adding...':(<>{Ic.plus} Add to whitelist</>)}
          </button>
        </div>
      )}

      {tab==='bulk'&&(
        <div style={{maxWidth:560}}>
          <div className="card" style={{marginBottom:16}}>
            <div className="card-title" style={{marginBottom:14}}>Upload Excel file</div>
            <div className="alert alert-warn" style={{marginBottom:14}}>
              Excel file must have a column named <strong>email</strong> (or Email / EMAIL). One email per row.
            </div>
            <div
              className={`drop-zone${drag?' drag':''}`}
              onClick={()=>fileRef.current?.click()}
              onDragOver={e=>{e.preventDefault();setDrag(true);}}
              onDragLeave={()=>setDrag(false)}
              onDrop={e=>{e.preventDefault();setDrag(false);setFile(e.dataTransfer.files[0]);}}
            >
              <input ref={fileRef} type="file" accept=".xlsx,.xls"
                onChange={e=>setFile(e.target.files[0])}/>
              <div className="dz-icon">📊</div>
              {file
                ? <><div className="dz-txt" style={{color:'var(--green)'}}>{file.name}</div><div className="dz-sub">{(file.size/1024).toFixed(1)} KB · Click to change</div></>
                : <><div className="dz-txt">Drop .xlsx file here</div><div className="dz-sub">or click to browse</div></>
              }
            </div>
            {file&&(
              <button className="btn btn-primary" style={{marginTop:12}} onClick={uploadXlsx} disabled={loading}>
                {loading?'Uploading...':(<>{Ic.upload} Upload &amp; process</>)}

          {result&&(
            <div className="card">
              <div className="card-title" style={{marginBottom:12}}>Upload result</div>
              <div className="g2">
                <div style={{textAlign:'center',padding:16,background:'var(--green-l)',borderRadius:var(--r),border:'1px solid var(--green-b)'}}>
                  <div style={{fontSize:28,fontWeight:700,color:'var(--green)',fontFamily:'var(--mono)'}}>{result.inserted}</div>
                  <div style={{fontSize:12,color:'var(--green)',marginTop:4}}>Emails added</div>
                </div>
                <div style={{textAlign:'center',padding:16,background:'var(--amber-l)',borderRadius:'8px',border:'1px solid var(--amber-b)'}}>
                  <div style={{fontSize:28,fontWeight:700,color:'var(--amber)',fontFamily:'var(--mono)'}}>{result.duplicates}</div>
                  <div style={{fontSize:12,color:'var(--amber)',marginTop:4}}>Skipped (duplicates)</div>
                </div>
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ─── ATTENDANCE ────────────────────────────────────────────
function Attendance({token}){
  const [date,setDate]=useState(todayStr());
  const [meal,setMeal]=useState('lunch');
  const [tab,setTab]=useState('summary');
  const [data,setData]=useState({summary:null,present:[],absent:[]});
  const [loading,setLoading]=useState(false);

  const load=async()=>{
    setLoading(true);
    const q=`?date=${date}&meal_type=${meal}`;
    try{
      const [sum,pres,abs]=await Promise.all([
        api.get('/admin/attendance/summary'+q,token),
        api.get('/admin/attendance'+q,token),
        api.get('/admin/attendance/absent'+q,token),
      ]);
      setData({summary:sum,present:pres.data||[],absent:abs.data||[]});
    }catch(e){}
    setLoading(false);
  };
  useEffect(()=>{load();},[date,meal]);

    const csv=[cols.join(','),...rows.map(r=>cols.map(c=>r[c]||'').join(','))].join('\n');
    const a=document.createElement('a');a.href='data:text/csv,'+encodeURIComponent(csv);a.download=fname;a.click();

            <label className="fl">Meal</label>
            <select className="fsel" value={meal} onChange={e=>setMeal(e.target.value)} style={{width:150}}>

              <option value="lunch">🌤 Lunch</option>
              <option value="dinner">🌙 Dinner</option>
            </select>
          </div>
          <button className="btn btn-outline btn-sm" onClick={load}>{Ic.refresh} Refresh</button>
        </div>
      </div>

      {s&&(
        <div className="g3" style={{marginBottom:20}}>
          {[
            {lbl:'Total booked', val:s.total_booked||0, cls:'b-blue',  color:'var(--blue)'},
            {lbl:'Present',       val:s.total_present||0,cls:'b-green', color:'var(--green)'},
            {lbl:'Absent',        val:s.total_absent||0, cls:'b-red',   color:'var(--red)'},

      <div className="tab-row">
        {[['summary','Summary'],['present',`Present (${data.present.length})`],['absent',`Absent (${data.absent.length})`]].map(([id,lbl])=>(
          <button key={id} className={`tab${tab===id?' active':''}`} onClick={()=>setTab(id)}>{lbl}</button>

          </div>
          <div className="tbl-wrap">
            <table>
              <thead><tr><th>Name</th><th>Reg no</th><th>Food pref</th><th>Token</th></tr></thead>

                {loading&&<tr><td colSpan="4" style={{textAlign:'center',padding:20,color:'var(--text3)'}}>Loading...</td></tr>}

function Bookings({token}){
  const [bookings,setBookings]=useState([]);
  const [loading,setLoading]=useState(true);
  const [search,setSearch]=useState('');
  const [filterStatus,setFilterStatus]=useState('all');
  const [filterMeal,setFilterMeal]=useState('all');

  useEffect(()=>{
    api.get('/booking',token).then(r=>{ if(Array.isArray(r)) setBookings(r); setLoading(false); });
  },[]);

  const filtered=bookings.filter(b=>{
    const q=search.toLowerCase();
    const matchSearch=!search||b.name?.toLowerCase().includes(q)||b.reg_no?.includes(search)||b.token_number?.includes(search);
    const matchStatus=filterStatus==='all'||b.status===filterStatus;
    const matchMeal=filterMeal==='all'||b.meal_type===filterMeal;
    return matchSearch&&matchStatus&&matchMeal;
  });

  const csvExport=()=>{
    const rows=[['ID','Student','Reg no','Meal','Food pref','Date','Status','Token'],...filtered.map(b=>[b.id,b.name,b.reg_no,b.meal_type,b.food_pref,b.date,b.status,b.token_number])];
    const csv=rows.map(r=>r.join(',')).join('\n');
    const a=document.createElement('a');a.href='data:text/csv,'+encodeURIComponent(csv);a.download='bookings.csv';a.click();
  };

  return(
    <div className="page">
      <div className="sh">
        <div><div className="sh-title">All bookings</div><div className="sh-sub">{bookings.length} total · {filtered.length} shown</div></div>
        <button className="btn btn-outline btn-sm" onClick={csvExport}>{Ic.upload} Export CSV</button>
      </div>
      <div className="card">
        <div style={{display:'flex',gap:10,marginBottom:14,flexWrap:'wrap'}}>
          <input className="fi" placeholder="Search student, reg no or token..." value={search}
            onChange={e=>setSearch(e.target.value)} style={{flex:1,minWidth:200}}/>
          <select className="fsel" value={filterStatus} onChange={e=>setFilterStatus(e.target.value)} style={{width:140}}>
            <option value="all">All statuses</option>
            <option value="active">Active</option>
            <option value="cancelled">Cancelled</option>
          </select>

            <option value="all">All meals</option>
            <option value="breakfast">Breakfast</option>
            <option value="lunch">Lunch</option>
            <option value="dinner">Dinner</option>
          </select>
        </div>
        <div className="tbl-wrap">
          <table>
            <thead><tr><th>Student</th><th>Reg no</th><th>Meal</th><th>Food pref</th><th>Date</th><th>Status</th></tr></thead>
            <tbody>
              {loading&&<tr><td colSpan="6" style={{textAlign:'center',padding:24,color:'var(--text3)'}}>Loading...</td></tr>}
              {!loading&&filtered.length===0&&<tr><td colSpan="6"><div className="empty"><div className="empty-icon">📅</div><div className="empty-txt">No bookings found</div></div></td></tr>}
              {filtered.map(b=>(
                <tr key={b.id}>
                  <td style={{fontWeight:600}}>{b.name}</td>
                  <td className="mono">{b.reg_no}</td>
                  <td><span className="badge b-blue" style={{textTransform:'capitalize'}}>{b.meal_type}</span></td>
                  <td style={{color:'var(--text2)'}}>{b.food_pref||'—'}</td>
                  <td className="mono">{b.date}</td>
                  <td><span className={`badge ${b.status==='active'?'b-green':'b-red'}`}>{b.status}</span></td>

        </div>

// ─── ADMIN ACCOUNTS ────────────────────────────────────────
function AdminAccounts({token,addToast,currentAdmin}){
  const [admins,setAdmins]=useState([]);
  const [loading,setLoading]=useState(true);
  const [showModal,setShowModal]=useState(false);
  const [form,setForm]=useState({name:'',email:'',password:'',confirmPass:''});
  const [formErr,setFormErr]=useState({});
  const [submitting,setSubmitting]=useState(false);
  const [deleting,setDeleting]=useState(null);

  const load=()=>{
    setLoading(true);
    api.get('/admin/all',token).then(r=>{ if(Array.isArray(r)) setAdmins(r); setLoading(false); });
  };
  useEffect(()=>{ load(); },[]);

  const validate=()=>{
    const e={};
    if(!form.name.trim()) e.name='Name is required';
    if(!form.email.trim()) e.email='Email is required';
    if(!form.password) e.password='Password required';
    else if(form.password.length<6) e.password='Min 6 characters';
    if(form.password!==form.confirmPass) e.confirmPass='Passwords do not match';
    setFormErr(e); return Object.keys(e).length===0;
  };

  const registerAdmin=async()=>{
    if(!validate()) return;
    setSubmitting(true);
    try{
      const res=await api.post('/admin/register',{name:form.name.trim(),email:form.email.trim(),password:form.password});
      if(res.id){
        addToast('✅',`Admin "${res.name}" added!`);
        setShowModal(false);setForm({name:'',email:'',password:'',confirmPass:''});setFormErr({});
        load();
      } else addToast('❌',res.message||'Failed');
    }catch(e){addToast('❌','Server error');}
    setSubmitting(false);
  };

  const deleteAdmin=async(id,name)=>{
    if(!window.confirm(`Delete admin "${name}"? This cannot be undone.`)) return;
    setDeleting(id);
    try{
      const r=await api.del(`/admin/${id}`,token);
      if(r.message?.includes('deleted')||r.id){addToast('✅','Admin deleted');load();}
      else addToast('❌',r.message||'Failed');
    }catch(e){addToast('❌','Server error');}
    setDeleting(null);
  };

  return(
    <div className="page">
      <div className="sh">
        <div><div className="sh-title">Admin accounts</div><div className="sh-sub">{admins.length} admins</div></div>
        <button className="btn btn-primary" onClick={()=>setShowModal(true)}>{Ic.plus} Add admin</button>
      </div>
      <div className="alert alert-warn" style={{marginBottom:16}}>
        Admin accounts have full access to this portal. Only add trusted users.
      </div>
      <div className="card">
        <div className="tbl-wrap">
          <table>
            <thead><tr><th>Name</th><th>Email</th><th>Joined</th><th>Actions</th></tr></thead>
            <tbody>
              {loading&&<tr><td colSpan="4" style={{textAlign:'center',padding:24,color:'var(--text3)'}}>Loading...</td></tr>}
              {!loading&&admins.length===0&&<tr><td colSpan="4"><div className="empty"><div className="empty-icon">🔐</div><div className="empty-txt">No admins found</div></div></td></tr>}
              {admins.map(a=>(
                <tr key={a.id}>
                  <td>
                    <div style={{display:'flex',alignItems:'center',gap:10}}>
                      <div style={{width:30,height:30,borderRadius:'50%',background:'var(--accent-l)',color:'var(--accent)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700}}>{initials(a.name)}</div>
                      <span style={{fontWeight:600}}>{a.name}</span>
                      {a.email===currentAdmin?.email&&<span className="badge b-accent">you</span>}
                    </div>
                  </td>
                  <td className="mono">{a.email}</td>
                  <td className="mono">{fmtDate(a.created_at)}</td>
                  <td>
                    {a.email!==currentAdmin?.email&&(
                      <button className="btn btn-danger btn-xs" onClick={()=>deleteAdmin(a.id,a.name)} disabled={deleting===a.id}>
                        {deleting===a.id?'...':Ic.trash}
                      </button>
                    )}
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>

      {showModal&&(
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setShowModal(false)}>
          <div className="modal">
            <div className="modal-hd">
              <div className="modal-title">Add admin account</div>
              <button className="modal-close" onClick={()=>setShowModal(false)}>×</button>
            </div>
            <div className="form-row">
              <div className="fg">
                <label className="fl">Full name *</label>
                <input className="fi" placeholder="Admin name" value={form.name} onChange={e=>setForm({...form,name:e.target.value})}/>
                {formErr.name&&<span className="form-err">{formErr.name}</span>}
              </div>
              <div className="fg">
                <label className="fl">Email *</label>
                <input className="fi" type="email" placeholder="admin@klu.ac.in" value={form.email} onChange={e=>setForm({...form,email:e.target.value})}/>
                {formErr.email&&<span className="form-err">{formErr.email}</span>}
              </div>
            </div>
            <div className="form-row">
              <div className="fg">
                <label className="fl">Password *</label>
                <input className="fi" type="password" placeholder="Min. 6 characters" value={form.password} onChange={e=>setForm({...form,password:e.target.value})}/>
                {formErr.password&&<span className="form-err">{formErr.password}</span>}
              </div>
              <div className="fg">
                <label className="fl">Confirm password *</label>
                <input className="fi" type="password" placeholder="Repeat password" value={form.confirmPass} onChange={e=>setForm({...form,confirmPass:e.target.value})}/>
                {formErr.confirmPass&&<span className="form-err">{formErr.confirmPass}</span>}
              </div>
            </div>
            <hr className="divider"/>
            <div style={{display:'flex',gap:10,justifyContent:'flex-end'}}>
              <button className="btn btn-outline" onClick={()=>setShowModal(false)}>Cancel</button>
              <button className="btn btn-primary" onClick={registerAdmin} disabled={submitting}>
                {submitting?'Adding...':<>{Ic.check} Add admin</>}
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── APP ──────────────────────────────────────────────────
function App(){
  const [token,setToken]=useState(()=>localStorage.getItem('admin_token'));
  const [admin,setAdmin]=useState(()=>{const s=localStorage.getItem('admin_user');return s?JSON.parse(s):null;});
  const [page,setPage]=useState('dashboard');
  const [toasts,setToasts]=useState([]);
  const [showSettings,setShowSettings]=useState(false);

  const addToast=(icon,msg)=>{
    const id=Date.now();
    setToasts(t=>[...t,{id,icon,msg}]);
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),3200);
  };

  const handleLogin=(tok,payload)=>{
    setToken(tok);setAdmin(payload);
    localStorage.setItem('admin_token',tok);
    localStorage.setItem('admin_user',JSON.stringify(payload));
  };

  const logout=()=>{
    setToken(null);setAdmin(null);
    localStorage.removeItem('admin_token');
    localStorage.removeItem('admin_user');
  };

  // Ping backend on load
  useEffect(()=>{ api.ping(); },[]);

  const [now,setNow]=useState(()=>new Date().toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short'}));

  if(!token) return(
    <>
      <Login onLogin={handleLogin}/>
      {showSettings && <SettingsModal onClose={()=>setShowSettings(false)}/>}
      <button onClick={()=>setShowSettings(true)} style={{
        position:'fixed',bottom:20,right:20,zIndex:300,
        background:'var(--ink)',color:'#fff',border:'none',
        borderRadius:8,padding:'8px 14px',fontSize:12,cursor:'pointer',
        fontFamily:'var(--font)',opacity:.7,
      }}>⚙️ Backend settings</button>
    </>
  );

  const renderPage=()=>{
    switch(page){
      case 'dashboard':  return <Dashboard token={token}/>;
      case 'students':   return <Students token={token}/>;
      case 'staff':      return <Staff token={token} addToast={addToast}/>;
      case 'emails':     return <AllowedEmails token={token} addToast={addToast}/>;
      case 'attendance': return <Attendance token={token}/>;
      case 'bookings':   return <Bookings token={token}/>;
      case 'admins':     return <AdminAccounts token={token} addToast={addToast} currentAdmin={admin}/>;
      default: return null;
    }
  };

  return(
    <div className="app">
      <aside className="sidebar">
        <div className="sidebar-top">
          <div className="s-label">ADMIN</div>
          <div className="s-title">KLU Hostel</div>
          <div className="s-sub">Control centre</div>
        </div>
        <nav className="nav">
          <div className="nav-group-label">Management</div>
          {NAV.map(n=>(
            <button key={n.id} className={`nav-btn${page===n.id?' active':''}`} onClick={()=>setPage(n.id)}>
              {n.icon}{n.label}
            </button>
          ))}
          <div className="nav-group-label" style={{marginTop:8}}>System</div>
          <button className="nav-btn" onClick={()=>setShowSettings(true)}>
            <svg width="15" height="15" viewBox="0 0 15 15" fill="none" stroke="currentColor" strokeWidth="1.4"><circle cx="7.5" cy="7.5" r="2"/><path d="M7.5 1v1.2M7.5 12.3V13.5M1 7.5h1.2M12.3 7.5H13.5M2.8 2.8l.85.85M11.35 11.35l.85.85M11.35 2.8l-.85.85M3.65 11.35l-.85.85"/></svg>
            Backend settings
          </button>
        </nav>
        <div className="sidebar-foot">
          <div className="admin-chip">
            <div className="admin-av">{initials(admin?.name||'A')}</div>
            <div style={{flex:1,minWidth:0}}>
              <div className="admin-name">{admin?.name||'Admin'}</div>
              <div className="admin-role">administrator</div>
            </div>
            <button className="logout-icon" onClick={logout} title="Sign out">{Ic.logout}</button>
          </div>
        </div>
      </aside>

      <main className="main">
        <header className="topbar">
          <div className="topbar-left">
            <div className="topbar-title">{TITLES[page]||'Settings'}</div>
          </div>
          <div className="topbar-right">
            <ConnStatusDot/>
            <span className="tb-date">{now}</span>
          </div>
        </header>
        <ConnBanner onOpenSettings={()=>setShowSettings(true)}/>
        <div className="content">{renderPage()}</div>
      </main>

      <Toast toasts={toasts}/>
      {showSettings && <SettingsModal onClose={()=>setShowSettings(false)}/>}
    </div>
  );
}

// Small status dot in topbar
function ConnStatusDot() {
  const [status, setStatus] = useState(connStatus);
  useEffect(() => {
    const fn = s => setStatus(s);
    connListeners.push(fn);
    return () => { const i = connListeners.indexOf(fn); if(i>-1) connListeners.splice(i,1); };
  }, []);
  const colors = { ok:'#2a7d4f', error:'#c0392b', unknown:'#b5620a' };
  const labels = { ok:'Connected', error:'Offline', unknown:'Checking...' };
  return (
    <div style={{display:'flex',alignItems:'center',gap:5,fontSize:11,color:'var(--text3)',background:'var(--bg3)',padding:'4px 10px',borderRadius:6,border:'1px solid var(--border)'}}>
      <span style={{width:6,height:6,borderRadius:'50%',background:colors[status],display:'inline-block',flexShrink:0}}/>
      {labels[status]}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
